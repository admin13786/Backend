# Hot-reload dev inside Docker: mount repo, run `next dev` (no full rebuild on code edits).
# Usage: docker compose -f docker-compose.dev.yml up
# First time / after Dockerfile.dev or lockfile changes: add --build
# Stop the production stack first if both would use port 3000, or change ports below.

services:
  openmaic-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        APK_MIRROR: mirrors.aliyun.com
        NPM_REGISTRY: https://registry.npmmirror.com
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      NODE_ENV: development
      # File watching through bind mounts (especially Docker Desktop → Windows paths)
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      # Override in .env.local if needed
      NODE_OPTIONS: "--max-old-space-size=8192"
    volumes:
      - .:/app
      - openmaic-pnpm-store:/root/.local/share/pnpm/store
      - openmaic-data:/app/data
    stdin_open: true
    tty: true

volumes:
  openmaic-pnpm-store:
  openmaic-data:
