services:
  agent-do:
    build:
      context: ../Agent-Do
      dockerfile: Dockerfile
      args:
        APT_MIRROR: ${AGENT_DO_APT_MIRROR:-https://mirrors.aliyun.com/debian}
        PIP_INDEX_URL: ${AGENT_DO_PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
    container_name: agent-do
    environment:
      - AGENT_DATA_ROOT=/data
      - AGENT_DATA_HOST_ROOT=${AGENT_DATA_HOST_ROOT}
      - CLAUDE_DOCKER_IMAGE=${CLAUDE_DOCKER_IMAGE:-claude-runtime:latest}
      - DEFAULT_RUNTIME_PROFILE=${DEFAULT_RUNTIME_PROFILE:-aliyun}
      - DEFAULT_CLAUDE_MODEL=${DEFAULT_CLAUDE_MODEL:-sonnet}
      - ALIYUN_ANTHROPIC_BASE_URL=${ALIYUN_ANTHROPIC_BASE_URL:-https://dashscope.aliyuncs.com/apps/anthropic}
      - ALIYUN_ANTHROPIC_API_KEY=${ALIYUN_ANTHROPIC_API_KEY:-${DASHSCOPE_API_KEY:-}}
      - ALIYUN_ANTHROPIC_MODEL=${ALIYUN_ANTHROPIC_MODEL:-qwen3-coder-next}
      - APP_RUNTIME_IMAGE=${APP_RUNTIME_IMAGE:-node:20-alpine}
      - APP_RUNTIME_NPM_REGISTRY=${APP_RUNTIME_NPM_REGISTRY:-https://registry.npmmirror.com}
      - APP_RUNTIME_MEMORY=${APP_RUNTIME_MEMORY:-2g}
      - APP_RUNTIME_CPUS=${APP_RUNTIME_CPUS:-1}
      - APP_RUNTIME_INTERNAL_PORT=${APP_RUNTIME_INTERNAL_PORT:-3000}
      - APP_RUNTIME_START_TIMEOUT_SECONDS=${APP_RUNTIME_START_TIMEOUT_SECONDS:-30}
      - CLAUDE_TIMEOUT_SECONDS=${CLAUDE_TIMEOUT_SECONDS:-900}
      - CLAUDE_MEMORY=${CLAUDE_MEMORY:-2g}
      - CLAUDE_CPUS=${CLAUDE_CPUS:-1}
    volumes:
      - ${DOCKER_SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock
      - ../Agent-Do/data:/data
    ports:
      - "${AGENT_DO_PORT:-18000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  url-generate:
    build: .
    container_name: Workshop
    ports:
      - "${WORKSHOP_PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      - OSS_ACCESS_KEY_ID=${OSS_ACCESS_KEY_ID:-}
      - OSS_ACCESS_KEY_SECRET=${OSS_ACCESS_KEY_SECRET:-}
      - OSS_BUCKET_NAME=${OSS_BUCKET_NAME:-}
      - OSS_ENDPOINT=${OSS_ENDPOINT:-}
      - OSS_DOMAIN=${OSS_DOMAIN:-}
      # 与 app.py 一致：阿里云百炼 DashScope（兼容 OpenAI 接口）
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - AGENT_DO_BASE_URL=${AGENT_DO_BASE_URL:-http://agent-do:8000}
      - AGENT_DO_DEFAULT_MODEL=${AGENT_DO_DEFAULT_MODEL:-sonnet}
      - AGENT_DO_MAX_TURNS=${AGENT_DO_MAX_TURNS:-8}
    volumes:
      - ./metrics.db:/app/metrics.db
    depends_on:
      agent-do:
        condition: service_healthy
    restart: unless-stopped
